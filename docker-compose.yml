services:
  web:
    build: .
    container_name: burn_app
    volumes:
      - .:/app
      - ./media:/app/media
      - ./db.sqlite3:/app/db.sqlite3
    environment:
      - DEBUG=False
      - DJANGO_ALLOWED_HOSTS=*
    expose:
      - "8000"
    restart: always

  nginx:
    image: nginx:latest
    container_name: burn_nginx
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./media:/app/media
      - ./certs:/etc/nginx/certs
      - /etc/letsencrypt:/etc/letsencrypt
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    restart: always
