name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            # 1. Navigate to project directory
            cd ~/burn_project

            # 2. Pull latest changes from main
            git pull origin main

            # 3. Rebuild and restart containers
            docker-compose up -d --build

            # 4. Cleanup unused Docker images to save space
            docker image prune -f

            # 5. Health Check
            echo "Waiting for containers to start..."
            sleep 15
            if curl -s -k -I https://localhost | grep -q "200 OK"; then
              echo "✅ Deployment Successful: Application is responding."
            else
              echo "⚠️ Deployment Check: Site may still be loading, check manually."
            fi
